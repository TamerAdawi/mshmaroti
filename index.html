<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#fefae0" />
    <meta name="description" content="מעקב משמרות וטיפים — משמרותי" />
    <script>
      // Apply the saved theme before first paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var t = localStorage.getItem('mshmaroti-theme') || 'system'
          var dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.classList.toggle('dark', dark)
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', dark ? '#1a2110' : '#fefae0')
        } catch (e) {}
      })()
    </script>
    <title>משמרותי</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700;800&family=Rubik:wght@500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
